version: 2
updates:
  # Backend npm dependencies
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Riyadh
    open-pull-requests-limit: 10
    versioning-strategy: auto
    labels:
      - dependencies
      - backend
    reviewers:
      - team:backend
    # Group minor/patch updates into a single PR
    groups:
      minor-patch:
        update-types:
          - minor
          - patch

  # Frontend npm dependencies
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Riyadh
    open-pull-requests-limit: 10
    versioning-strategy: auto
    labels:
      - dependencies
      - frontend
    groups:
      minor-patch:
        update-types:
          - minor
          - patch

  # Mobile npm dependencies
  - package-ecosystem: npm
    directory: /mobileapp
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Riyadh
    open-pull-requests-limit: 5
    versioning-strategy: auto
    labels:
      - dependencies
      - mobile
    groups:
      minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Riyadh
    labels:
      - dependencies
      - ci
